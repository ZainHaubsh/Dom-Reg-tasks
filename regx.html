<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration & Login Form</title>
    <style>
        .error {
            color: red;
            font-size: 13px;
            margin: 5px 0 15px 0;
            min-height: 18px;
        }

        .success {
            color: green;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 120px;
        }
    </style>
</head>

<body>
    <div class="form">
        <h2>Register</h2>
        <form id="registerForm">
            <div>
                <label for="firstname">First Name:</label>
                <input type="text" id="firstname" required>
                <label for="secondname">Second Name:</label>
                <input type="text" id="secondname" required>
            </div>
            <p id="nameerror" class="error"></p>

            <div>
                <label for="bd">Birthdate:</label>
                <input type="date" id="bd" required>
            </div>
            <p id="bderror" class="error"></p>

            <div>
                <label for="email">Email:</label>
                <input type="text" id="email" required>
                <label for="confirmemail" style="margin-top: 10px;">Confirm Email:</label>
                <input type="text" id="confirmemail" required>
            </div>
            <p id="emailerror" class="error"></p>

            <div>
                <label for="pass">Password:</label>
                <input type="password" id="pass" required>
                <label for="confirmpass" style="margin-top: 10px;">Confirm Password:</label>
                <input type="password" id="confirmpass" required>
            </div>
            <p id="passerror" class="error"></p>

            <div>
                <label for="mobile">Mobile Number:</label>
                <input type="text" id="mobile" required>
            </div>
            <p id="mobileerror" class="error"></p>

            <button type="submit">Submit Registration</button>
            <p id="regSuccess" class="success"></p>
        </form>
    </div>

    <div class="form">
        <h2>Login</h2>
        <form id="loginForm">
            <div>
                <label for="loginEmail">Email Address:</label>
                <input type="text" id="loginEmail" required>
            </div>

            <div>
                <label for="loginPass">Password:</label>
                <input type="password" id="loginPass" required>
            </div>
            <p id="loginError" class="error"></p>

            <button type="submit">Sign In</button>
            <p id="loginSuccess" class="success"></p>
        </form>
    </div>

    <script>
        let first = document.getElementById("firstname");
        let second = document.getElementById("secondname");
        let nameerror = document.getElementById("nameerror");
        let bd = document.getElementById("bd");
        let bderror = document.getElementById("bderror");
        let email = document.getElementById("email");
        let confirmemail = document.getElementById("confirmemail");
        let emailerror = document.getElementById("emailerror");
        let pass = document.getElementById("pass");
        let confirmpass = document.getElementById("confirmpass");
        let passerror = document.getElementById("passerror");
        let mobile = document.getElementById("mobile");
        let mobileerror = document.getElementById("mobileerror");
        let registerForm = document.getElementById("registerForm");
        let regSuccess = document.getElementById("regSuccess");

        let loginForm = document.getElementById("loginForm");
        let loginEmail = document.getElementById("loginEmail");
        let loginPass = document.getElementById("loginPass");
        let loginError = document.getElementById("loginError");
        let loginSuccess = document.getElementById("loginSuccess");

        let nameregex = /^[A-Za-z]+$/;
        let emailreg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;


        function validateNames() {
            if (first.value !== "" && !nameregex.test(first.value)) {
                nameerror.innerHTML = "First Name should have only letters";
                return false;
            } else if (second.value !== "" && !nameregex.test(second.value)) {
                nameerror.innerHTML = "Second Name should have only letters";
                return false;
            } else {
                nameerror.innerHTML = "";
                return true;
            }
        }
        first.oninput = validateNames;
        second.oninput = validateNames;

        function validateBirthdate() {
            let dateVal = bd.value;
            if (!dateVal) {
                bderror.innerHTML = "Birthdate cannot be empty";
                return false;
            }
            let selectedDate = new Date(dateVal);
            let today = new Date();
            today.setHours(0, 0, 0, 0);
            if (selectedDate >= today) {
                bderror.innerHTML = "Birthdate must be in the past!";
                return false;
            } else {
                bderror.innerHTML = "";
                return true;
            }
        }
        bd.onchange = validateBirthdate;

        function validateEmails() {
            emailerror.innerHTML = "";
            try {
                if (email.value !== "" && !emailreg.test(email.value)) {
                    throw new Error("Email is not in a correct format");
                }
                if (confirmemail.value !== "" && !emailreg.test(confirmemail.value)) {
                    throw new Error("Confirm email is not in a correct format");
                }
                if (email.value !== "" && confirmemail.value !== "" && email.value !== confirmemail.value) {
                    throw new Error("Emails do not match");
                }
                return true;
            } catch (err) {
                emailerror.innerHTML = err.message;
                return false;
            }
        }
        email.oninput = validateEmails;
        confirmemail.oninput = validateEmails;

        function validatePassword() {
            let value = pass.value;
            passerror.innerHTML = "";

            if (value === "") return false;
            if (!/^[A-Z]/.test(value)) {
                passerror.innerHTML = "Password must start with a capital letter";
                return false;
            }
            let digitCount = (value.match(/\d/g) || []).length;
            if (digitCount < 2) {
                passerror.innerHTML = "Password must have at least two numbers";
                return false;
            }
            if (!/[^A-Za-z0-9]/.test(value)) {
                passerror.innerHTML = "Password must contain at least one special character or symbol";
                return false;
            }
            if (value.length < 8 || value.length > 32) {
                passerror.innerHTML = "Password length must be between 8 and 32 characters";
                return false;
            }
            if (confirmpass.value !== "" && confirmpass.value !== value) {
                passerror.innerHTML = "Passwords do not match";
                return false;
            }
            return true;
        }
        pass.oninput = validatePassword;
        confirmpass.oninput = validatePassword;

        function validateMobile() {
            let value = mobile.value;
            if (value === "") {
                mobileerror.innerHTML = "";
                return false;
            }
            let isTenDigits = /^\d{10}$/.test(value);
            if (!isTenDigits) {
                mobileerror.innerHTML = "Mobile number must be exactly 10 digits";
                return false;
            } else {
                mobileerror.innerHTML = "";
                return true;
            }
        }
        mobile.oninput = validateMobile;

        registerForm.onsubmit = function (e) {
            e.preventDefault();

            let isNameValid = validateNames();
            let isDateValid = validateBirthdate();
            let isEmailValid = validateEmails();
            let isPassValid = validatePassword();
            let isMobileValid = validateMobile();
            if (isNameValid && isDateValid && isEmailValid && isPassValid && isMobileValid) {
                let userEmail = email.value.trim().toLowerCase();

                let user = {
                    firstName: first.value.trim(),
                    secondName: second.value.trim(),
                    birthdate: bd.value,
                    email: userEmail,
                    password: pass.value,
                    mobile: mobile.value.trim()
                };

                localStorage.setItem(userEmail, JSON.stringify(user));

                regSuccess.innerHTML = "User Registered Successfully!";
                registerForm.reset();
            } else {
                regSuccess.innerHTML = "";
            }
        };

        loginForm.onsubmit = function (e) {
            e.preventDefault();

            loginError.innerHTML = "";
            loginSuccess.innerHTML = "";

            let enteredEmail = loginEmail.value.trim().toLowerCase();
            let enteredPass = loginPass.value;
            let storedUserStr = localStorage.getItem(enteredEmail);

            if (!storedUserStr) {
                loginError.innerHTML = "Account with this email does not exist.";
                return;
            }
            let storedUserObj = JSON.parse(storedUserStr);

            if (storedUserObj.password === enteredPass) {
                loginSuccess.innerHTML = `Welcome back, ${storedUserObj.firstName}! Login successful.`;
                loginForm.reset();
            } else {
                loginError.innerHTML = "Incorrect password. Please try again.";
            }
        };
    </script>
</body>

</html>
